name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: oss-ubuntu-latest-m
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/doordash-oss/PropertyTestingKit/blob/main/CONTRIBUTOR_LICENSE_AGREEMENT.md'
          branch: 'main'
          allowlist: alex-reilly-dd,dependabot[bot]
          custom-notsigned-prcomment: 'Thanks for your contribution! Before we can merge this PR, please sign the [Contributor License Agreement](https://github.com/doordash-oss/PropertyTestingKit/blob/main/CONTRIBUTOR_LICENSE_AGREEMENT.md) by posting the following comment on this PR:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
